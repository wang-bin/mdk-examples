kotlin.code.style=official
android.useAndroidX=true
android.nonTransitiveRClass=true
org.gradle.jvmargs=-Xmx4g -XX:+UseParallelGC
org.gradle.configuration-cache=true

# Set the path to the MDK SDK for the current platform.
# Download from: https://sourceforge.net/projects/mdk-sdk/files/nightly/
#
# For iOS cinterop (overridden by MDK_SDK_PATH env var if set):
# mdk.sdk.ios=/path/to/mdk-sdk-ios
#
# For Desktop (overridden by MDK_SDK_PATH env var if set):
# mdk.sdk.desktop=/path/to/mdk-sdk-desktop
